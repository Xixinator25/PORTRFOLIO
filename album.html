<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Album | Shooted by Alexis</title>
    <meta name="description" id="meta-description" content="Découvrez une galerie photo exclusive de sport capturée par Alexis Sartoris.">
    <link rel="canonical" href="https://shooted-by-alexis.vercel.app/album.html">

    <!-- Social Meta Tags placeholders -->
    <meta property="og:title" id="og-title" content="Album | Shooted by Alexis">
    <meta property="og:description" id="og-description" content="Découvrez cette galerie photo sportive.">
    <meta property="og:url" content="https://shooted-by-alexis.vercel.app/album.html">
    <meta property="og:type" content="article">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css?v=5">
    <link rel="icon" href="favicon.png" type="image/png">

    <style>
        .album-header-section {
            padding: 8rem 5% 4rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.9), var(--bg-dark));
            position: relative;
        }

        /* Glassmorphism background container */
        .album-header-section::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 900px;
            height: 85%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 0;
        }

        .album-header-section>* {
            position: relative;
            z-index: 1;
        }

        /* Category with gradient and enhanced effects */
        .ah-category {
            display: inline-block;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 3px;
            font-weight: 600;
            text-transform: uppercase;

            /* Gradient text */
            background: linear-gradient(135deg, #E94560 0%, #FF6B9D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            /* Glow effect */
            filter: drop-shadow(0 2px 12px rgba(233, 69, 96, 0.4));

            /* Entrance animation */
            animation: slideInDown 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            animation-fill-mode: both;
        }

        /* Title with multiple shadows and animation */
        .ah-title {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            line-height: 1;
            letter-spacing: -1px;

            /* Multiple text shadows for depth */
            text-shadow:
                0 1px 0 rgba(255, 255, 255, 0.1),
                0 2px 4px rgba(0, 0, 0, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.3),
                0 8px 16px rgba(0, 0, 0, 0.2),
                0 12px 24px rgba(0, 0, 0, 0.15);

            /* Entrance animation */
            animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s;
            animation-fill-mode: both;

            /* Subtle hover effect */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ah-title:hover {
            transform: scale(1.02);
        }

        /* Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .match-gallery {
            padding: 0 5% 4rem;
        }

        .mg-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .mg-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 3/2;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .mg-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .mg-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.3s ease, filter 0.3s ease;
            opacity: 1;
            filter: none;
        }

        .mg-item img.blur-load {
            filter: blur(10px);
            opacity: 0.7;
        }

        .mg-item img.blur-load.loaded {
            filter: none;
            opacity: 1;
        }

        .mg-item:hover img {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .ah-title {
                font-size: 2.2rem;
            }

            .ah-category {
                font-size: 0.9rem;
                letter-spacing: 2px;
            }

            .mg-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"><a href="index.html">shooted.by.<span>alexis</span></a></div>
        <nav>
            <ul>
                <li><a href="index.html#portfolio">Galerie</a></li>
                <li><a href="stats.html" style="color:var(--primary);">Data & Stats</a></li>
                <li><a href="about.html">À Propos</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div id="lightbox">
        <div id="lightbox-close">&times;</div>
        <div id="lb-prev" class="lb-nav-btn"><i class="fa-solid fa-chevron-left"></i></div>
        <div id="lb-next" class="lb-nav-btn"><i class="fa-solid fa-chevron-right"></i></div>
        <img id="lightbox-img" src="" alt="Zoom">
    </div>

    <!-- Cursor Glow -->
    <div id="cursor-glow"></div>

    <section id="album-content" class="album-header-section">
        <h1 id="album-h1-category" class="ah-category">Chargement...</h1>
        <h2 id="album-h2-title" class="ah-title">Patientez un instant</h2>
        <div id="loader-placeholder" style="padding: 2rem;">Préparation de la galerie...</div>
    </section>

    <section class="match-gallery">
        <div id="gallery-grid" class="mg-grid"></div>
    </section>

    <footer>
        <p style="padding:2rem; color:#444; font-size:0.8rem; text-align: center;">&copy; 2026 Alexis Sartoris -
            shooted.by.alexis</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script>
        // --- CURSOR GLOW ---
        function initCursorGlow() {
            const glow = document.getElementById('cursor-glow');
            if (!glow) return;

            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
            let currentX = mouseX, currentY = mouseY;
            let isAnimating = false;

            glow.style.left = '0px';
            glow.style.top = '0px';
            glow.style.transform = `translate3d(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px), 0)`;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (!isAnimating) {
                    isAnimating = true;
                    requestAnimationFrame(animate);
                }
            }, { passive: true });

            function animate() {
                const dx = mouseX - currentX;
                const dy = mouseY - currentY;
                if (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) {
                    isAnimating = false;
                    return;
                }
                currentX += dx * 0.15;
                currentY += dy * 0.15;
                glow.style.transform = `translate3d(calc(-50% + ${Math.round(currentX * 10) / 10}px), calc(-50% + ${Math.round(currentY * 10) / 10}px), 0)`;
                if (isAnimating) requestAnimationFrame(animate);
            }
            isAnimating = true;
            requestAnimationFrame(animate);
        }

        // --- BASIC LENIS ---
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- FETCH & DISPLAY ---
        document.addEventListener('DOMContentLoaded', async () => {
            initCursorGlow();

            const urlParams = new URLSearchParams(window.location.search);
            const albumId = urlParams.get('id') || urlParams.get('album');

            if (!albumId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const albumsRes = await fetch(`/albums.json?t=${Date.now()}`);
                const albums = await albumsRes.json();

                // Try exact match first
                let album = albums.find(a => a.id === albumId);

                // Fallback: try match by slugified title if no ID match
                if (!album) {
                    const slugify = text => text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                    album = albums.find(a => a.id === albumId || slugify(a.title) === albumId);
                }

                if (!album) {
                    document.getElementById('album-content').innerHTML = "<h1>Album introuvable</h1><a href='index.html' class='btn btn-outline'>Retour</a>";
                    return;
                }

                // Update Head Meta for SEO
                const pageTitle = `${album.title} - ${album.category} | Shooted by Alexis`;
                const pageDesc = `Photos du match ${album.title} (${album.category}) capturées par Alexis Sartoris à Montbéliard.`;
                
                document.title = pageTitle;
                document.getElementById('meta-description').setAttribute('content', pageDesc);
                document.getElementById('og-title').setAttribute('content', pageTitle);
                document.getElementById('og-description').setAttribute('content', pageDesc);
                if(album.cover) {
                    const ogImg = document.createElement('meta');
                    ogImg.setAttribute('property', 'og:image');
                    ogImg.content = `https://shooted-by-alexis.vercel.app/${album.cover}`;
                    document.head.appendChild(ogImg);
                }

                // Render Header Content
                document.getElementById('album-h1-category').innerText = album.category;
                document.getElementById('album-h2-title').innerText = album.title;
                document.getElementById('loader-placeholder').style.display = 'none';
                
                const returnBtn = document.createElement('div');
                returnBtn.style.marginTop = '1rem';
                returnBtn.innerHTML = '<a href="index.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Retour Accueil</a>';
                document.getElementById('album-content').appendChild(returnBtn);

                // Render Images
                if (album.images && album.images.length > 0) {
                    const grid = document.getElementById('gallery-grid');
                    grid.innerHTML = '';

                    album.images.forEach((imgSrc, index) => {
                        const item = document.createElement('div');
                        item.className = 'mg-item'; // Removed 'reveal' class

                        // Generate optimized image paths
                        const base = imgSrc.substring(0, imgSrc.lastIndexOf('.'));
                        const tiny = `${base}_tiny.webp`;
                        const small = `${base}_small.webp`;
                        const medium = `${base}_medium.webp`;
                        const large = `${base}_large.webp`;

                        // Create img element with lazy loading
                        let imgTag = '';
                        if (imgSrc.endsWith('.webp') && imgSrc.includes('_large')) {
                            // Already optimized webp - use progressive loading
                            const baseOptimized = imgSrc.replace('_large.webp', '');
                            if (index < 4) {
                                imgTag = `<img 
                                    src="${imgSrc}" 
                                    srcset="${baseOptimized}_small.webp 500w, ${baseOptimized}_medium.webp 800w, ${imgSrc} 1200w"
                                    sizes="(max-width: 600px) 90vw, (max-width: 900px) 45vw, 300px"
                                    alt="Photo Album" 
                                    fetchpriority="high"
                                    onerror="this.parentElement.style.display='none'">`;
                            } else {
                                imgTag = `<img 
                                    src="${baseOptimized}_tiny.webp"
                                    data-src="${imgSrc}" 
                                    data-srcset="${baseOptimized}_small.webp 500w, ${baseOptimized}_medium.webp 800w, ${imgSrc} 1200w"
                                    sizes="(max-width: 600px) 90vw, (max-width: 900px) 45vw, 300px"
                                    alt="Photo Album" 
                                    class="blur-load"
                                    loading="lazy"
                                    onerror="this.parentElement.style.display='none'">`;
                            }

                        } else {
                            // JPG with generated optimized versions
                            if (index < 4) {
                                imgTag = `<img 
                                    src="${imgSrc}" 
                                    srcset="${small} 500w, ${medium} 800w, ${large} 1200w"
                                    sizes="(max-width: 600px) 90vw, (max-width: 900px) 45vw, 300px"
                                    alt="Photo Album" 
                                    fetchpriority="high"
                                    onerror="this.parentElement.style.display='none'">`;
                            } else {
                                imgTag = `<img 
                                    src="${tiny}"
                                    data-src="${imgSrc}" 
                                    data-srcset="${small} 500w, ${medium} 800w, ${large} 1200w"
                                    sizes="(max-width: 600px) 90vw, (max-width: 900px) 45vw, 300px"
                                    alt="Photo Album" 
                                    class="blur-load"
                                    loading="lazy"
                                    onerror="this.parentElement.style.display='none'">`;
                            }
                        }

                        item.innerHTML = imgTag;
                        item.onclick = () => openLightbox(index, album.images);
                        grid.appendChild(item);
                    });

                    // Setup lazy loading observer for images with optimized preloading
                    const imgObserver = new IntersectionObserver((entries, observer) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const img = entry.target.querySelector('img');
                                if (!img) return;

                                const src = img.getAttribute('data-src');
                                const srcset = img.getAttribute('data-srcset');

                                if (src) {
                                    img.src = src;
                                    img.onload = () => img.classList.add('loaded');
                                }
                                if (srcset) {
                                    img.srcset = srcset;
                                }

                                observer.unobserve(entry.target);
                            }
                        });
                    }, {
                        rootMargin: "500px 0px",  // Increased from 200px for smoother loading
                        threshold: 0.01  // Lower threshold for earlier trigger
                    });

                    // Observe all items for lazy loading
                    document.querySelectorAll('.mg-item').forEach(el => imgObserver.observe(el));

                } else {
                    document.getElementById('gallery-grid').innerHTML = "<p style='text-align:center; width:100%; color:#888;'>Cet album est vide pour le moment.</p>";
                }

            } catch (err) {
                console.error("Album load error:", err);
                document.getElementById('album-content').innerHTML = `<h1>Erreur de chargement</h1><p>${err.message}</p><a href='index.html' class='btn btn-outline'>Retour</a>`;
            }
        });

        // --- LIGHTBOX LOGIC ---
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        let currentImages = [];
        let currentIndex = 0;

        function openLightbox(index, images) {
            currentImages = images;
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function updateLightbox() {
            lbImg.src = currentImages[currentIndex];
        }

        document.getElementById('lightbox-close').onclick = closeLightbox;
        function closeLightbox() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('lb-next').onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % currentImages.length; updateLightbox(); };
        document.getElementById('lb-prev').onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length; updateLightbox(); };

        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };

    </script>
</body>

</html>
